addedSheet:
  LIST_MAP=content: #ListMap
    - no: "1"
      name: "this sheet was added"

changedSheet:
  LIST_MAP=requestParams: #ListMap
    - "[no]": "1"
      name: "after"
      status: "same"
      note: "cell changed"
    - "[no]": "3"
      name: "added row"
      status: "head only"
      note: "row was added"

  EXPECTED_VARIABLE=./tmp/result.csv: #RawRows
    - [ "text-encoding", "UTF-8" ]
    - [ "field-separator", "," ]
    - [ "header", "id", "city" ]
    - [ "data", "001", "Kyoto" ]
    - [ "data", "003", "Nara" ]

  EXPECTED_TABLE=ADDED_BLOCK: #ListMap
    - ID: "9"
      VALUE: "this block was added"

  EXPECTED_TABLE=STABLE_BLOCK: #ListMap
    - ID: "1"
      VALUE: "no change here"

stableSheet:
  LIST_MAP=noChange: #ListMap
    - no: "1"
      name: "unchanged"
